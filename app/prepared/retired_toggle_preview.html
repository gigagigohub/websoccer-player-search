<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retired Toggle Preview</title>
  <link rel="stylesheet" href="../style.css?v=20260513-retired-preview" />
  <style>
    body {
      background: #071120;
      color: #e7f0ff;
      box-sizing: border-box;
      margin: 0;
      padding: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: inherit;
    }

    .preview-wrap {
      max-width: 372px;
      margin: 0 auto;
    }

    .preview-title {
      margin: 0 0 14px;
      font-size: 1rem;
      font-weight: 900;
    }

    .preview-panel {
      border: 1px solid #263b5e;
      border-radius: 10px;
      background: linear-gradient(180deg, #17243a 0%, #0f1a2b 100%);
      padding: 14px;
    }

    .preview-category-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 5px;
      align-items: center;
      margin-bottom: 12px;
    }

    .preview-grid {
      display: grid;
      gap: 12px;
    }

    .preview-option {
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      border: 1px solid #263b5e;
      border-radius: 8px;
      background: #101b2d;
      padding: 10px;
    }

    .preview-no {
      color: #8ea2c5;
      font-size: 0.74rem;
      font-weight: 900;
      text-align: center;
    }

    .preview-copy {
      color: #9fb0cf;
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1.35;
      margin-top: 6px;
    }

    .retired-preview-current {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #b8c8e8;
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .retired-preview-current input {
      width: auto;
    }

    .retired-preview-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      border: 1px solid #2d4166;
      border-radius: 999px;
      background: #0b1424;
      color: #9fb1cf;
      font-size: 0.7rem;
      font-weight: 900;
      padding: 0 10px;
      white-space: nowrap;
    }

    .retired-preview-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #546780;
      box-shadow: 0 0 0 2px rgba(84, 103, 128, 0.16);
    }

    .retired-preview-mini-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      width: 132px;
      height: 28px;
      border: 1px solid #2b4168;
      border-radius: 8px;
      background: #0b1424;
      overflow: hidden;
      font-size: 0.66rem;
      font-weight: 900;
    }

    .retired-preview-mini-switch span {
      display: grid;
      place-items: center;
      color: #879ab9;
    }

    .retired-preview-mini-switch span:first-child {
      background: linear-gradient(180deg, #1c3658, #132944);
      color: #e8f2ff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .retired-preview-icon {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #9fb1cf;
      font-size: 0.72rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .retired-preview-icon .box {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border: 1px solid #2d4166;
      border-radius: 7px;
      background: linear-gradient(180deg, #14233a, #0c1728);
      color: #7083a1;
      font-size: 0.84rem;
    }

    .retired-preview-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      border: 1px dashed #365071;
      border-radius: 7px;
      color: #8fa2c1;
      background: rgba(12, 23, 39, 0.45);
      font-size: 0.68rem;
      font-weight: 900;
      padding: 0 10px;
      max-width: 100%;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main class="preview-wrap">
    <h1 class="preview-title">Include Retired Toggle Patterns</h1>
    <section class="preview-panel">
      <div class="preview-category-row">
        <span class="badge type-badge cat-nr-r13">NR</span>
        <span class="badge type-badge cat-nr-r4">NR</span>
        <span class="badge type-badge cat-nr-r56">NR</span>
        <span class="badge type-badge cat-nr-r7">NR</span>
        <span class="badge type-badge cat-cc">CC</span>
        <span class="badge type-badge cat-ss">SS</span>
        <span class="badge type-badge cat-cm">CM</span>
      </div>
      <div class="preview-grid">
        <div class="preview-option">
          <div class="preview-no">1</div>
          <div>
            <label class="retired-preview-current"><input type="checkbox" /> Include Retired</label>
            <div class="preview-copy">現行型。目立たず、機能の存在だけ示す。</div>
          </div>
        </div>
        <div class="preview-option">
          <div class="preview-no">2</div>
          <div>
            <div class="retired-preview-pill"><span class="dot"></span> Retired hidden</div>
            <div class="preview-copy">状態表示型。通常は控えめで、ON時だけ文言変更しやすい。</div>
          </div>
        </div>
        <div class="preview-option">
          <div class="preview-no">3</div>
          <div>
            <div class="retired-preview-mini-switch"><span>Active</span><span>All</span></div>
            <div class="preview-copy">小型セグメント型。切り替え感は明確だが少し目立つ。</div>
          </div>
        </div>
        <div class="preview-option">
          <div class="preview-no">4</div>
          <div>
            <div class="retired-preview-icon"><span class="box">R</span> Include Retired</div>
            <div class="preview-copy">アイコン型。現在より少し視認性を上げつつ、面積は小さい。</div>
          </div>
        </div>
        <div class="preview-option">
          <div class="preview-no">5</div>
          <div>
            <button type="button" class="retired-preview-ghost">Show retired</button>
            <div class="preview-copy">ゴーストボタン型。押せるUIとしては分かりやすいが、現行より主張する。</div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
