<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSoccer Ordinary - Coaches</title>
  <meta property="og:title" content="WebSoccer Ordinary" />
  <meta property="og:site_name" content="WebSoccer Ordinary" />
  <meta name="twitter:title" content="WebSoccer Ordinary" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=20260324-013653" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico?v=20260324-013653" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png?v=20260324-013653" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png?v=20260324-013653" />
  <link rel="shortcut icon" href="./favicon.ico?v=20260324-013653" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <button id="menuButton" type="button" class="menu-button" aria-label="メニュー">☰</button>
      <div id="menuPanel" class="menu-panel">
        <button id="playersButton" type="button" class="menu-item">Players</button>
        <button id="coachesButton" type="button" class="menu-item is-current" aria-current="page">Coaches</button>
        <button id="formationsButton" type="button" class="menu-item">Formations</button>
        <button id="myTeamButton" type="button" class="menu-item">My Team</button>
        <button id="loginButton" type="button" class="menu-item">Login</button>
        <button id="logoutButton" type="button" class="menu-item logout" hidden>Logout</button>
      </div>
      <h1>WebSoccer Ordinary</h1>
      <p class="meta" id="metaText">Loading...</p>
    </header>

    <section class="panel formation-filter-panel">
      <div class="formation-filter-grid">
        <div>
          <label class="label" for="coachNameQuery">Name</label>
          <input id="coachNameQuery" type="text" placeholder="Name" />
        </div>
        <div>
          <label class="label" for="coachTypeFilter">Type</label>
          <select id="coachTypeFilter">
            <option value="">ALL</option>
            <option value="1">超攻撃型</option>
            <option value="2">攻撃型</option>
            <option value="3">バランス型</option>
            <option value="4">守備型</option>
            <option value="5">超守備型</option>
          </select>
        </div>
      </div>
      <div class="apply-row">
        <button id="coachSearchButton" type="button" class="search-btn">Search</button>
      </div>
    </section>

    <section class="panel">
      <div class="result-head">
        <h2>Coaches</h2>
        <span id="coachCount">0 results</span>
      </div>
      <div id="coachList" class="coach-list"></div>
    </section>
  </main>

  <div id="loginModal" class="season-modal" hidden>
    <div id="loginBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
      <div class="season-head">
        <h2 id="loginTitle">Login</h2>
        <button id="loginClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p class="season-target">TeamIDを入力してください</p>
      <label class="label" for="loginLineupKey">TeamID</label>
      <input id="loginLineupKey" type="text" />
      <div class="season-actions">
        <button id="signupOpen" type="button" class="add-btn">Create New ID</button>
        <button id="loginApply" type="button">Login</button>
      </div>
    </div>
  </div>

  <div id="signupModal" class="season-modal" hidden>
    <div id="signupBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="signupTitle">
      <div class="season-head">
        <h2 id="signupTitle">Sign Up</h2>
        <button id="signupClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <label class="label" for="signupLineupKey">TeamID</label>
      <input id="signupLineupKey" type="text" placeholder="新規ID（任意の半角英数字記号）" />
      <div class="season-actions">
        <button id="signupCancel" type="button" class="ghost">Cancel</button>
        <button id="signupApply" type="button">Create</button>
      </div>
    </div>
  </div>

  <div id="seasonModal" class="season-modal" hidden>
    <div id="seasonBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="seasonTitle">
      <div class="season-head">
        <h2 id="seasonTitle">登録期の選択</h2>
        <button id="seasonClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p id="seasonTarget" class="season-target"></p>
      <label class="label" for="seasonSelect">期</label>
      <select id="seasonSelect"></select>
      <div class="season-actions">
        <button id="seasonCancel" type="button" class="ghost">Cancel</button>
        <button id="seasonApply" type="button">OK</button>
      </div>
    </div>
  </div>

  <div id="coachModal" class="season-modal" hidden>
    <div id="coachBackdrop" class="season-backdrop"></div>
    <div class="formation-dialog" role="dialog" aria-modal="true" aria-labelledby="coachTitle">
      <div class="season-head">
        <h2 id="coachTitle">Coach Detail</h2>
        <button id="coachClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <div id="coachDetail" class="formation-detail"></div>
    </div>
  </div>

  <div id="formationModal" class="season-modal" hidden>
    <div id="formationBackdrop" class="season-backdrop"></div>
    <div class="formation-dialog" role="dialog" aria-modal="true" aria-labelledby="formationTitle">
      <div class="season-head">
        <h2 id="formationTitle">Formation Detail</h2>
        <button id="formationClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <div id="formationDetail" class="formation-detail"></div>
    </div>
  </div>

  <script src="./coaches.js"></script>
</body>
</html>
