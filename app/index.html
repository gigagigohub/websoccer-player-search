<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSoccer Ordinary 2026</title>
  <meta property="og:title" content="WebSoccer Ordinary 2026" />
  <meta property="og:site_name" content="WebSoccer Ordinary 2026" />
  <meta name="twitter:title" content="WebSoccer Ordinary 2026" />
  <link rel="apple-touch-icon" href="./icons/wsdb-icon-160.png" />
  <link rel="icon" type="image/png" sizes="160x160" href="./icons/wsdb-icon-160.png" />
  <link rel="shortcut icon" href="./icons/wsdb-icon-160.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <button id="menuButton" type="button" class="menu-button" aria-label="メニュー">☰</button>
      <div id="menuPanel" class="menu-panel" hidden>
        <button id="loginButton" type="button" class="menu-item">Login</button>
        <button id="myTeamButton" type="button" class="menu-item" hidden>MyTeam</button>
        <button id="logoutButton" type="button" class="menu-item logout" hidden>Logout</button>
      </div>
      <h1>WebSoccer Ordinary 2026</h1>
      <p class="meta" id="metaText">Loading data...</p>
    </header>

    <section class="panel">
      <label class="label" for="nameQuery">Player Name</label>
      <input id="nameQuery" type="text" placeholder="選手名検索（部分一致/ひらがな可）" />

      <div class="logic-row">
        <div>
          <label class="label" for="positionFilter">Position</label>
          <select id="positionFilter">
            <option value="">ALL</option>
            <option value="GK">GK</option>
            <option value="DF">DF</option>
            <option value="MF">MF</option>
            <option value="FW">FW</option>
          </select>
        </div>
        <div>
          <label id="aptitudeAreaLabel" class="label" for="aptitudePositionFilter">Position Area (7)</label>
          <div class="area-control-row">
            <select id="aptitudePositionFilter" class="area-select">
              <option value="">ALL</option>
              <option value="GK">GK</option>
              <option value="RSB">RSB</option>
              <option value="CB">CB</option>
              <option value="LSB">LSB</option>
              <option value="RDM">RDM</option>
              <option value="CDM">CDM</option>
              <option value="LDM">LDM</option>
              <option value="RMF">RMF</option>
              <option value="OMF">OMF</option>
              <option value="LMF">LMF</option>
              <option value="RWG">RWG</option>
              <option value="CF">CF</option>
              <option value="LWG">LWG</option>
            </select>
            <label class="label aptitude-toggle">
              <input id="aptitudeIncludeSix" type="checkbox" />
              &gt;=6
            </label>
          </div>
        </div>
      </div>
      <label class="label">Category</label>
      <div class="flag-row">
        <label><input id="normalOnly" type="checkbox" /> NR</label>
        <label><input id="ccOnly" type="checkbox" /> CC</label>
        <label><input id="ssOnly" type="checkbox" /> SS</label>
        <label><input id="cmOnly" type="checkbox" /> CM</label>
        <label><input id="naOnly" type="checkbox" /> NA</label>
      </div>

      <div id="conditions"></div>
      <div class="buttons">
        <button id="addCondition" type="button" class="add-btn">Add Filter</button>
        <button id="resetCondition" type="button" class="ghost">Reset</button>
      </div>
      <div class="apply-row">
        <button id="applySearch" type="button" class="search-btn">Search</button>
      </div>
    </section>

    <section class="panel">
      <div class="result-head">
        <h2>Results</h2>
        <span id="resultCount">0 results</span>
      </div>
      <div id="results" class="results"></div>
    </section>
  </main>

  <div id="lineupModal" class="lineup-modal" hidden>
    <div id="lineupBackdrop" class="lineup-backdrop"></div>
    <div class="lineup-dialog" role="dialog" aria-modal="true" aria-labelledby="lineupTitle">
      <div class="lineup-head">
        <h2 id="lineupTitle">スタメン登録</h2>
        <button id="lineupClose" type="button" class="lineup-close" aria-label="閉じる">×</button>
      </div>
      <div class="lineup-mode-switch">
        <button id="lineupStarterMode" type="button" class="lineup-mode-btn is-active">スタメン登録</button>
        <button id="lineupSuccessorMode" type="button" class="lineup-mode-btn">後継選手登録</button>
      </div>
      <p id="lineupTarget" class="lineup-target"></p>
      <div id="lineupSlots" class="lineup-slots"></div>
    </div>
  </div>

  <div id="seasonModal" class="season-modal" hidden>
    <div id="seasonBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="seasonTitle">
      <div class="season-head">
        <h2 id="seasonTitle">登録期の選択</h2>
        <button id="seasonClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p id="seasonTarget" class="season-target"></p>
      <label class="label" for="seasonSelect">期</label>
      <select id="seasonSelect"></select>
      <div class="season-actions">
        <button id="seasonCancel" type="button" class="ghost">Cancel</button>
        <button id="seasonApply" type="button">OK</button>
      </div>
    </div>
  </div>

  <div id="loginModal" class="season-modal" hidden>
    <div id="loginBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
      <div class="season-head">
        <h2 id="loginTitle">Login</h2>
        <button id="loginClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p class="season-target">TeamIDを入力してください</p>
      <label class="label" for="loginLineupKey">TeamID</label>
      <input id="loginLineupKey" type="text" />
      <div class="season-actions">
        <button id="signupOpen" type="button" class="add-btn">Create New ID</button>
        <button id="loginApply" type="button">Login</button>
      </div>
    </div>
  </div>

  <div id="signupModal" class="season-modal" hidden>
    <div id="signupBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="signupTitle">
      <div class="season-head">
        <h2 id="signupTitle">Sign Up</h2>
        <button id="signupClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p class="season-target">新規TeamIDを入力してください</p>
      <label class="label" for="signupLineupKey">TeamID</label>
      <input id="signupLineupKey" type="text" placeholder="新規ID（任意の半角英数字記号）" />
      <div class="season-actions">
        <button id="signupCancel" type="button" class="ghost">Cancel</button>
        <button id="signupApply" type="button">Create</button>
      </div>
    </div>
  </div>

  <div id="successorSourceModal" class="season-modal" hidden>
    <div id="successorSourceBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="successorSourceTitle">
      <div class="season-head">
        <h2 id="successorSourceTitle">所属先の入力</h2>
        <button id="successorSourceClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p id="successorSourceTarget" class="season-target"></p>
      <label class="label" for="successorSourceType">所属先</label>
      <select id="successorSourceType">
        <option value="self">自チーム</option>
        <option value="custom">任意入力</option>
      </select>
      <div id="successorSourceCustomWrap" class="source-custom-wrap" hidden>
        <label class="label" for="successorSourceInput">任意の所属先</label>
        <input id="successorSourceInput" type="text" placeholder="現在所属しているチーム名" />
      </div>
      <div class="season-actions">
        <button id="successorSourceCancel" type="button" class="ghost">Cancel</button>
        <button id="successorSourceApply" type="button">OK</button>
      </div>
    </div>
  </div>

  <template id="conditionTemplate">
    <div class="condition-row">
      <select class="metric"></select>
      <select class="op">
        <option value="gte">>=</option>
        <option value="lte"><=</option>
        <option value="eq">=</option>
        <option value="between">Range</option>
      </select>
      <input class="value1" type="number" inputmode="numeric" />
      <span class="between-sep">〜</span>
      <input class="value2" type="number" inputmode="numeric" />
      <button type="button" class="remove">Remove</button>
    </div>
  </template>

  <script src="./app.js"></script>
</body>
</html>
