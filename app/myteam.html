<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSoccer Ordinary 2026 - MyTeam</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <button id="myteamMenuButton" type="button" class="menu-button" aria-label="メニュー">☰</button>
      <div id="myteamMenuPanel" class="menu-panel" hidden>
        <button id="myteamDatabaseButton" type="button" class="menu-item">Database</button>
        <button id="myteamLogoutButton" type="button" class="menu-item logout">Logout</button>
      </div>
      <h1>MyTeam</h1>
      <p class="meta" id="myTeamMeta">Loading...</p>
    </header>

    <section class="panel">
      <div class="lineup-dialog myteam-dialog-static">
        <p id="myTeamTarget" class="lineup-target">Lineup</p>
        <div id="myTeamSlots" class="lineup-slots"></div>
      </div>
    </section>
  </main>

  <script src="./myteam.js"></script>
</body>
</html>
