<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSoccer Ordinary - My Team</title>
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=20260324-013653" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico?v=20260324-013653" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png?v=20260324-013653" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png?v=20260324-013653" />
  <link rel="shortcut icon" href="./favicon.ico?v=20260324-013653" />
  <link rel="stylesheet" href="./style.css?v=20260507-sticky-header" />
</head>
<body class="myteam-page">
  <main class="container">
    <header class="hero">
      <button id="myteamMenuButton" type="button" class="menu-button" aria-label="メニュー">☰</button>
      <div id="myteamMenuPanel" class="menu-panel">
        <div id="myteamMenuLoginId" class="menu-login-id" hidden></div>
        <button id="myteamDatabaseButton" type="button" class="menu-item">Players</button>
        <button id="myteamCoachesButton" type="button" class="menu-item">Coaches</button>
        <button id="myteamFormationsButton" type="button" class="menu-item">Formations</button>
        <button id="myteamCurrentButton" type="button" class="menu-item is-current" aria-current="page">My Team</button>
        <button id="myteamLoginButton" type="button" class="menu-item" hidden>Login</button>
        <button id="myteamLogoutButton" type="button" class="menu-item logout" hidden>Logout</button>
      </div>
      <h1>WebSoccer Ordinary</h1>
      <p class="meta" id="myTeamMeta">Loading...</p>
    </header>

    <section class="panel lifecycle-panel">
      <div class="lifecycle-controls">
        <button id="lifecycleToggle" type="button" class="lifecycle-toggle">Cycle Management Mode</button>
        <button id="advanceSeasonButton" type="button" class="season-step-btn">Season +1</button>
        <button id="rewindSeasonButton" type="button" class="season-step-back" aria-label="1期戻す">-1</button>
      </div>
    </section>

    <section class="panel">
      <p id="myTeamTarget" class="lineup-target"></p>
      <div class="myteam-section-band">Starting Members</div>
      <div id="myTeamSlots" class="lineup-slots"></div>
      <div class="myteam-section-band">Reserves</div>
      <div id="myTeamReserveSlots" class="lineup-slots"></div>
      <div id="myTeamReserveTotals" class="reserve-totals"></div>
      <div class="myteam-section-band">Head Coach</div>
      <div id="myTeamCoachWrap" class="myteam-coach-wrap"></div>
      <div class="myteam-section-band">Formation</div>
      <div id="myTeamFormationWrap" class="myteam-formation-wrap"></div>
    </section>
  </main>

  <div id="loginModal" class="season-modal" hidden>
    <div id="loginBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
      <div class="season-head">
        <h2 id="loginTitle">Login</h2>
        <button id="loginClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p class="season-target">TeamIDを入力してください</p>
      <label class="label" for="loginLineupKey">TeamID</label>
      <input id="loginLineupKey" type="text" />
      <div class="season-actions">
        <button id="signupOpen" type="button" class="add-btn">Create New ID</button>
        <button id="loginApply" type="button">Login</button>
      </div>
    </div>
  </div>

  <div id="signupModal" class="season-modal" hidden>
    <div id="signupBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="signupTitle">
      <div class="season-head">
        <h2 id="signupTitle">Sign Up</h2>
        <button id="signupClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <label class="label" for="signupLineupKey">TeamID</label>
      <input id="signupLineupKey" type="text" placeholder="新規ID（任意の半角英数字記号）" />
      <div class="season-actions">
        <button id="signupCancel" type="button" class="ghost">Cancel</button>
        <button id="signupApply" type="button">Create</button>
      </div>
    </div>
  </div>

  <div id="myTeamFormationEditor" class="season-modal" hidden>
    <div id="myTeamFormationBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="myTeamFormationTitle">
      <div class="season-head">
        <h2 id="myTeamFormationTitle">Formation</h2>
        <button id="myTeamFormationCancel" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <label class="label" for="myTeamFormationSelect">Choose Formation</label>
      <select id="myTeamFormationSelect">
        <option value="">Not selected</option>
      </select>
      <div class="season-actions">
        <button id="myTeamFormationApply" type="button">Apply</button>
      </div>
    </div>
  </div>

  <div id="emptySlotModal" class="season-modal" hidden>
    <div id="emptySlotBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="emptySlotTitle">
      <div class="season-head">
        <h2 id="emptySlotTitle">未登録</h2>
        <button id="emptySlotClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p class="season-target">PlayersからAddボタンで選手を登録してください。</p>
      <div class="season-actions">
        <button id="emptySlotOk" type="button">OK</button>
      </div>
    </div>
  </div>

  <div id="playerCardModal" class="season-modal" hidden>
    <div id="playerCardBackdrop" class="season-backdrop"></div>
    <div class="season-dialog player-card-wrap" role="dialog" aria-modal="true" aria-labelledby="playerCardTitle">
      <div class="season-head">
        <h2 id="playerCardTitle">Player</h2>
        <button id="playerCardClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <div id="playerCardHost"></div>
      <div class="player-card-actions">
        <button id="playerReplaceBtn" type="button" class="player-replace-btn">Replace Player</button>
        <button id="playerRemoveSuccessorBtn" type="button" class="player-delete-btn" hidden>Remove Successor</button>
      </div>
      <div id="playerReplacePanel" class="player-replace-panel" hidden>
        <label class="label" for="playerReplaceSearch">Replace with</label>
        <input id="playerReplaceSearch" type="search" autocomplete="off" placeholder="Search player name / ID" />
        <div id="playerReplaceResults" class="player-replace-results"></div>
        <label class="label" for="playerReplaceSeason">Season</label>
        <select id="playerReplaceSeason"></select>
        <div id="playerReplaceSourceWrap" class="player-replace-source-wrap" hidden>
          <label class="label" for="playerReplaceSourceType">Source Team</label>
          <select id="playerReplaceSourceType">
            <option value="self">自チーム</option>
            <option value="custom">その他</option>
          </select>
          <div id="playerReplaceSourceCustomWrap" class="source-custom-wrap" hidden>
            <label class="label" for="playerReplaceSourceInput">Team Name</label>
            <input id="playerReplaceSourceInput" type="text" placeholder="例: チームシェンモ" />
          </div>
        </div>
        <div class="season-actions player-replace-actions">
          <button id="playerReplaceApply" type="button">Replace</button>
          <button id="playerReplaceCancel" type="button" class="ghost">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div id="coachCardModal" class="season-modal" hidden>
    <div id="coachCardBackdrop" class="season-backdrop"></div>
    <div class="season-dialog player-card-wrap" role="dialog" aria-modal="true" aria-labelledby="coachCardTitle">
      <div class="season-head">
        <h2 id="coachCardTitle">Coach</h2>
        <button id="coachCardClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <div id="coachCardHost"></div>
      <div class="player-card-actions">
        <button id="coachReplaceBtn" type="button" class="player-replace-btn">Replace Coach</button>
      </div>
      <div id="coachReplacePanel" class="player-replace-panel" hidden>
        <label class="label" for="coachReplaceSearch">Replace with</label>
        <input id="coachReplaceSearch" type="search" autocomplete="off" placeholder="Search coach name / ID" />
        <div id="coachReplaceResults" class="player-replace-results"></div>
        <label class="label" for="coachReplaceSeason">Season</label>
        <select id="coachReplaceSeason"></select>
        <div class="season-actions player-replace-actions">
          <button id="coachReplaceApply" type="button">Replace</button>
          <button id="coachReplaceCancel" type="button" class="ghost">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div id="myteamSettingModal" class="season-modal" hidden>
    <div id="myteamSettingBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="myteamSettingTitle">
      <div class="season-head">
        <h2 id="myteamSettingTitle">Setting</h2>
        <button id="myteamSettingClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p class="season-target">現在のTeamID設定を管理します</p>
      <label class="label" for="myteamRenameLineupKey">Rename ID</label>
      <input id="myteamRenameLineupKey" type="text" />
      <div class="season-actions">
        <button id="myteamRenameIdApply" type="button">Rename ID</button>
        <button id="myteamDeleteIdApply" type="button" class="ghost">Delete ID</button>
      </div>
    </div>
  </div>

  <script src="./myteam.js?v=20260507-coach-replace"></script>
</body>
</html>
