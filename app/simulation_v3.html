<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSoccer Ordinary - Simulation</title>
  <meta property="og:title" content="WebSoccer Ordinary" />
  <meta property="og:site_name" content="WebSoccer Ordinary" />
  <meta name="twitter:title" content="WebSoccer Ordinary" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=20260324-013653" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico?v=20260324-013653" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png?v=20260324-013653" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png?v=20260324-013653" />
  <link rel="shortcut icon" href="./favicon.ico?v=20260324-013653" />
  <link rel="stylesheet" href="./style.css?v=20260515-simulation-v3" />
</head>
<body class="simulation-page">
  <main class="container">
    <header class="hero">
      <button id="menuButton" type="button" class="menu-button" aria-label="メニュー">☰</button>
      <div id="menuPanel" class="menu-panel">
        <div id="menuLoginId" class="menu-login-id" hidden></div>
        <button id="playersButton" type="button" class="menu-item">Players</button>
        <button id="coachesButton" type="button" class="menu-item">Coaches</button>
        <button id="formationsButton" type="button" class="menu-item">Formations</button>
        <button id="collectionsButton" type="button" class="menu-item">Collections</button>
        <button id="simulationButton" type="button" class="menu-item is-current" aria-current="page">Simulation</button>
        <button id="myTeamButton" type="button" class="menu-item">My Team</button>
      </div>
      <h1>WebSoccer Ordinary</h1>
      <p class="meta" id="metaText">Loading...</p>
    </header>

    <section class="panel simulation-intro-panel">
      <div class="result-head simulation-title-row">
        <h2>V3 Expected Simulation</h2>
        <span id="calibrationStatus">Calibration: loading</span>
      </div>
      <p class="simulation-note">
        V3 = Starting XI pts + Head Coach pts. Results are calibrated from historical CC data when available.
      </p>
      <div class="simulation-actions">
        <button id="fillExample" type="button" class="ghost">Fill Example</button>
        <button id="clearSimulation" type="button" class="ghost">Clear</button>
      </div>
    </section>

    <section class="simulation-team-grid">
      <section class="panel simulation-team-panel" data-side="home">
        <div class="simulation-team-head">
          <h2>Home</h2>
          <span id="homeStarterCount">0/11</span>
        </div>
        <label class="label" for="homeCoachPts">Head Coach pts</label>
        <input id="homeCoachPts" class="simulation-coach-pts" data-side="home" type="number" step="0.1" inputmode="decimal" placeholder="0.0" />
        <div id="homeRows" class="simulation-player-rows"></div>
      </section>

      <section class="panel simulation-team-panel" data-side="away">
        <div class="simulation-team-head">
          <h2>Away</h2>
          <span id="awayStarterCount">0/11</span>
        </div>
        <label class="label" for="awayCoachPts">Head Coach pts</label>
        <input id="awayCoachPts" class="simulation-coach-pts" data-side="away" type="number" step="0.1" inputmode="decimal" placeholder="0.0" />
        <div id="awayRows" class="simulation-player-rows"></div>
      </section>
    </section>

    <section class="panel simulation-results-panel">
      <div class="result-head">
        <h2>Result</h2>
        <span id="resultSource">-</span>
      </div>
      <div id="simulationSummary" class="simulation-summary-grid"></div>
      <div class="simulation-subgrid">
        <div>
          <h3>Breakdown</h3>
          <div id="simulationBreakdown" class="simulation-breakdown"></div>
        </div>
        <div>
          <h3>Top Scores</h3>
          <div id="scoreDistribution" class="score-distribution"></div>
        </div>
      </div>
      <div id="simulationWarnings" class="simulation-warnings" hidden></div>
    </section>
  </main>

  <script src="./simulation_v3_core.js?v=20260515-simulation-v3"></script>
  <script src="./simulation_v3.js?v=20260515-simulation-v3"></script>
</body>
</html>
