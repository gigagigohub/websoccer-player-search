<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSoccer Ordinary 2026</title>
  <meta property="og:title" content="WebSoccer Ordinary 2026" />
  <meta property="og:site_name" content="WebSoccer Ordinary 2026" />
  <meta name="twitter:title" content="WebSoccer Ordinary 2026" />
  <link rel="apple-touch-icon" href="./icons/wsdb-icon-160.png" />
  <link rel="icon" type="image/png" sizes="160x160" href="./icons/wsdb-icon-160.png" />
  <link rel="shortcut icon" href="./icons/wsdb-icon-160.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>WebSoccer Ordinary 2026</h1>
      <p class="meta" id="metaText">Loading data...</p>
    </header>

    <section class="panel">
      <label class="label" for="nameQuery">Player Name</label>
      <input id="nameQuery" type="text" placeholder="部分一致（ひらがな/カタカナ可・中点あり/なし可）" />

      <div class="logic-row">
        <div>
          <label class="label" for="logicMode">Condition Logic</label>
          <select id="logicMode">
            <option value="AND">AND (match all)</option>
            <option value="OR">OR (match any)</option>
          </select>
        </div>
      </div>
      <div class="logic-row">
        <div>
          <label class="label" for="positionFilter">Position</label>
          <select id="positionFilter">
            <option value="">All</option>
            <option value="GK">Goalkeeper (GK)</option>
            <option value="DF">Defender (DF)</option>
            <option value="MF">Midfielder (MF)</option>
            <option value="FW">Forward (FW)</option>
          </select>
        </div>
      </div>
      <div class="flag-row">
        <label><input id="normalOnly" type="checkbox" /> NR</label>
        <label><input id="ccOnly" type="checkbox" /> CC</label>
        <label><input id="ssOnly" type="checkbox" /> SS</label>
        <label><input id="cmOnly" type="checkbox" /> CM</label>
        <label><input id="naOnly" type="checkbox" /> NA</label>
      </div>

      <div id="conditions"></div>
      <div class="buttons">
        <button id="addCondition" type="button" class="add-btn">Add Condition</button>
        <button id="resetCondition" type="button" class="ghost">Reset</button>
      </div>
      <div class="apply-row">
        <button id="applySearch" type="button" class="search-btn">Search</button>
      </div>
    </section>

    <section class="panel">
      <div class="result-head">
        <h2>Results</h2>
        <span id="resultCount">0 results</span>
      </div>
      <div id="results" class="results"></div>
    </section>
  </main>

  <template id="conditionTemplate">
    <div class="condition-row">
      <select class="metric"></select>
      <select class="op">
        <option value="gte">>=</option>
        <option value="lte"><=</option>
        <option value="eq">=</option>
        <option value="between">Range</option>
      </select>
      <input class="value1" type="number" inputmode="numeric" />
      <span class="between-sep">〜</span>
      <input class="value2" type="number" inputmode="numeric" />
      <button type="button" class="remove">Remove</button>
    </div>
  </template>

  <script src="./app.js"></script>
</body>
</html>
