<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSoccer Database</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>WebSoccer Database</h1>
      <p class="meta" id="metaText">データ読込中...</p>
    </header>

    <section class="panel">
      <label class="label" for="nameQuery">選手名</label>
      <input id="nameQuery" type="text" placeholder="部分一致で検索" />

      <div class="logic-row">
        <div>
          <label class="label" for="logicMode">条件の結合</label>
          <select id="logicMode">
            <option value="AND">AND（すべて満たす）</option>
            <option value="OR">OR（どれか満たす）</option>
          </select>
        </div>
      </div>
      <div class="logic-row">
        <div>
          <label class="label" for="positionFilter">ポジション</label>
          <select id="positionFilter">
            <option value="">すべて</option>
            <option value="GK">ゴールキーパー (GK)</option>
            <option value="DF">ディフェンス (DF)</option>
            <option value="MF">ミッドフィルダー (MF)</option>
            <option value="FW">フォワード (FW)</option>
          </select>
        </div>
      </div>
      <div class="flag-row">
        <label><input id="normalOnly" type="checkbox" /> NR</label>
        <label><input id="ccOnly" type="checkbox" /> CC</label>
        <label><input id="ssOnly" type="checkbox" /> SS</label>
        <label><input id="cmOnly" type="checkbox" /> CM</label>
        <label><input id="naOnly" type="checkbox" /> NA</label>
      </div>

      <div id="conditions"></div>
      <div class="buttons">
        <button id="addCondition" type="button" class="add-btn">条件を追加</button>
        <button id="resetCondition" type="button" class="ghost">リセット</button>
      </div>
      <div class="apply-row">
        <button id="applySearch" type="button" class="search-btn">検索</button>
      </div>
    </section>

    <section class="panel">
      <div class="result-head">
        <h2>検索結果</h2>
        <span id="resultCount">0件</span>
      </div>
      <div id="results" class="results"></div>
    </section>
  </main>

  <template id="conditionTemplate">
    <div class="condition-row">
      <select class="metric"></select>
      <select class="op">
        <option value="gte">>=</option>
        <option value="lte"><=</option>
        <option value="eq">=</option>
        <option value="between">範囲</option>
      </select>
      <input class="value1" type="number" inputmode="numeric" />
      <span class="between-sep">〜</span>
      <input class="value2" type="number" inputmode="numeric" />
      <button type="button" class="remove">削除</button>
    </div>
  </template>

  <script src="./app.js"></script>
</body>
</html>
