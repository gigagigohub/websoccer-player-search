<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSoccer Ordinary 2026 - MyTeam</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <button id="myteamMenuButton" type="button" class="menu-button" aria-label="メニュー">☰</button>
      <div id="myteamMenuPanel" class="menu-panel" hidden>
        <button id="myteamDatabaseButton" type="button" class="menu-item">Database</button>
        <button id="myteamLogoutButton" type="button" class="menu-item logout">Logout</button>
      </div>
      <h1>MyTeam</h1>
      <p class="meta" id="myTeamMeta">Loading...</p>
    </header>

    <section class="panel">
      <p id="myTeamTarget" class="lineup-target">Lineup</p>
      <div id="myTeamSlots" class="lineup-slots"></div>
    </section>
  </main>

  <div id="emptySlotModal" class="season-modal" hidden>
    <div id="emptySlotBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="emptySlotTitle">
      <div class="season-head">
        <h2 id="emptySlotTitle">未登録</h2>
        <button id="emptySlotClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p class="season-target">databaseからaddボタンで選手を登録してください。</p>
      <div class="season-actions">
        <button id="emptySlotOk" type="button">OK</button>
      </div>
    </div>
  </div>

  <div id="playerCardModal" class="season-modal" hidden>
    <div id="playerCardBackdrop" class="season-backdrop"></div>
    <div class="player-card-wrap">
      <button id="playerCardClose" type="button" class="player-card-close" aria-label="閉じる">×</button>
      <div id="playerCardHost"></div>
      <div class="player-card-actions">
        <button id="playerDeleteButton" type="button" class="player-delete-btn">Delete from Team</button>
      </div>
    </div>
  </div>

  <script src="./myteam.js"></script>
</body>
</html>
