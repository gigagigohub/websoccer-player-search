<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSoccer Ordinary - My Team</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <button id="myteamMenuButton" type="button" class="menu-button" aria-label="メニュー">☰</button>
      <div id="myteamMenuPanel" class="menu-panel" hidden>
        <button id="myteamDatabaseButton" type="button" class="menu-item">Players</button>
        <button id="myteamFormationsButton" type="button" class="menu-item">Formations</button>
        <button id="myteamSettingButton" type="button" class="menu-item">Setting</button>
        <button id="myteamLogoutButton" type="button" class="menu-item logout">Logout</button>
      </div>
      <h1>My Team</h1>
      <p class="meta" id="myTeamMeta">Loading...</p>
    </header>

    <section class="panel lifecycle-panel">
      <div class="lifecycle-controls">
        <button id="lifecycleToggle" type="button" class="lifecycle-toggle">Cycle Management Mode</button>
        <button id="advanceSeasonButton" type="button" class="season-step-btn">Season +1</button>
        <button id="rewindSeasonButton" type="button" class="season-step-back" aria-label="1期戻す">-1</button>
      </div>
      <div class="formation-select-row">
        <label class="label" for="myTeamFormationSelect">Formation</label>
        <div class="formation-current-row">
          <button id="myTeamFormationCurrent" type="button" class="formation-current-btn">Not selected</button>
          <button id="myTeamFormationChangeButton" type="button" class="formation-change-btn">Change</button>
        </div>
        <div id="myTeamFormationEditor" class="formation-editor" hidden>
          <select id="myTeamFormationSelect">
            <option value="">Not selected</option>
          </select>
          <div class="formation-editor-actions">
            <button id="myTeamFormationApply" type="button" class="formation-apply-btn">Apply</button>
            <button id="myTeamFormationCancel" type="button" class="formation-cancel-btn">Cancel</button>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <p id="myTeamTarget" class="lineup-target"></p>
      <div id="myTeamSlots" class="lineup-slots"></div>
    </section>
  </main>

  <div id="emptySlotModal" class="season-modal" hidden>
    <div id="emptySlotBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="emptySlotTitle">
      <div class="season-head">
        <h2 id="emptySlotTitle">未登録</h2>
        <button id="emptySlotClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p class="season-target">PlayersからAddボタンで選手を登録してください。</p>
      <div class="season-actions">
        <button id="emptySlotOk" type="button">OK</button>
      </div>
    </div>
  </div>

  <div id="playerCardModal" class="season-modal" hidden>
    <div id="playerCardBackdrop" class="season-backdrop"></div>
    <div class="season-dialog player-card-wrap" role="dialog" aria-modal="true" aria-labelledby="playerCardTitle">
      <div class="season-head">
        <h2 id="playerCardTitle">Player</h2>
        <button id="playerCardClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <div id="playerCardHost"></div>
      <div class="player-card-actions">
        <button id="playerDeleteBtn" type="button" class="player-delete-btn">Delete from Team</button>
      </div>
    </div>
  </div>

  <div id="myteamSettingModal" class="season-modal" hidden>
    <div id="myteamSettingBackdrop" class="season-backdrop"></div>
    <div class="season-dialog" role="dialog" aria-modal="true" aria-labelledby="myteamSettingTitle">
      <div class="season-head">
        <h2 id="myteamSettingTitle">Setting</h2>
        <button id="myteamSettingClose" type="button" class="season-close" aria-label="閉じる">×</button>
      </div>
      <p class="season-target">現在のTeamID設定を管理します</p>
      <label class="label" for="myteamRenameLineupKey">Rename ID</label>
      <input id="myteamRenameLineupKey" type="text" />
      <div class="season-actions">
        <button id="myteamRenameIdApply" type="button">Rename ID</button>
        <button id="myteamDeleteIdApply" type="button" class="ghost">Delete ID</button>
      </div>
    </div>
  </div>

  <script src="./myteam.js"></script>
</body>
</html>
